name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:

  # ----------------------------------------------------------
  # MODULE 1 — Validate Docker Compose syntax
  # ----------------------------------------------------------
  docker-validate:
    name: "M1 · Validate Docker Compose"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose \
            -f module-1-infrastructure/docker-compose.yml \
            config --quiet
          echo "✅ docker-compose.yml is valid"

