# ============================================================
# DevSecOps CI/CD Pipeline — GitHub Actions
# Repo: https://github.com/akhil65/DSO
#
# Active jobs:
#   [Module 1]  ✅ docker-validate     — YAML syntax check
#   [Module 1]  ✅ ossf-scorecard      — repo security posture score
#   [Module 2]  ✅ codeql              — GitHub SAST (free for public repos)
#   [Module 2]  🔒 sast-bandit         — Python SAST (uncomment in M2)
#   [Module 2]  🔒 sast-semgrep        — multi-language SAST (uncomment in M2)
#   [Module 2]  🔒 sca-trivy           — container CVE scan (uncomment in M2)
#   [Module 2]  🔒 sca-osv             — Google OSV dependency scan (uncomment in M2)
#   [Module 3]  🔒 dast-zap            — OWASP ZAP headless (uncomment in M3)
# ============================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ----------------------------------------------------------
  # MODULE 1 — Validate Docker Compose syntax
  # ----------------------------------------------------------
  docker-validate:
    name: "M1 · Validate Docker Compose"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose \
            -f devsecops-lab/module-1-infrastructure/docker-compose.yml \
            config --quiet
          echo "✅ docker-compose.yml is valid"

  # ----------------------------------------------------------
  # MODULE 1 — OSSF Scorecard
  # Scores the repo security posture across 18 checks
  # Results appear in GitHub Security tab
  # ----------------------------------------------------------
  ossf-scorecard:
    name: "M1 · OSSF Scorecard"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
          category: ossf-scorecard

  # ----------------------------------------------------------
  # MODULE 2 — CodeQL (GitHub native SAST)
  # Scans JavaScript for security vulnerabilities
  # Free for public repositories
  # ----------------------------------------------------------
  codeql:
    name: "M2 · CodeQL SAST"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-${{ matrix.language }}

