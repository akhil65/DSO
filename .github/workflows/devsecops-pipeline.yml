# ============================================================
# DevSecOps CI/CD Pipeline — GitHub Actions
# Repo: https://github.com/akhil65/DSO
#
# Active jobs:
#   [Module 1]  ✅ docker-validate     — YAML syntax check
#   [Module 1]  ✅ ossf-scorecard      — repo security posture score
#   [Module 2]  ✅ sast-bandit         — Python SAST
#   [Module 2]  ✅ sast-semgrep        — multi-language SAST
#   [Module 2]  ✅ sca-trivy           — container CVE scan
#   [Module 2]  ✅ sca-osv             — Google OSV dependency scan
#   [Module 2]  🔒 codeql              — GitHub SAST (needs JS source — unlock after M2 app added)
#   [Module 3]  🔒 dast-zap            — OWASP ZAP headless (uncomment in M3)
# ============================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ----------------------------------------------------------
  # MODULE 1 — Validate Docker Compose syntax
  # ----------------------------------------------------------
  docker-validate:
    name: "M1 · Validate Docker Compose"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose \
            -f devsecops-lab/module-1-infrastructure/docker-compose.yml \
            config --quiet
          echo "✅ docker-compose.yml is valid"

  # ----------------------------------------------------------
  # MODULE 1 — OSSF Scorecard
  # Scores the repo security posture across 18 checks
  # Results appear in GitHub Security tab
  # ----------------------------------------------------------
  ossf-scorecard:
    name: "M1 · OSSF Scorecard"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
          category: ossf-scorecard

  # ----------------------------------------------------------
  # MODULE 2 — CodeQL (GitHub native SAST)
  # Scans JavaScript source code for security vulnerabilities
  # Unlocked in Module 2 when vulnerable sample app is added
  # Free for public repositories
  # ----------------------------------------------------------
  # codeql:
  #   name: "M2 · CodeQL SAST"
  #   runs-on: ubuntu-latest
  #   permissions:
  #     security-events: write
  #     actions: read
  #     contents: read
  #   strategy:
  #     matrix:
  #       language: [javascript]
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #     - name: Initialize CodeQL
  #       uses: github/codeql-action/init@v3
  #       with:
  #         languages: ${{ matrix.language }}
  #         queries: security-and-quality
  #     - name: Autobuild
  #       uses: github/codeql-action/autobuild@v3
  #     - name: Perform CodeQL Analysis
  #       uses: github/codeql-action/analyze@v3
  #       with:
  #         category: codeql-${{ matrix.language }}

  # ----------------------------------------------------------
  # MODULE 2 — SAST: Bandit (Python)
  # ----------------------------------------------------------
  sast-bandit:
    name: "M2 · SAST — Bandit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r devsecops-lab/module-2-sast/sample-vulnerable-app/ \
                -f json -o bandit-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ----------------------------------------------------------
  # MODULE 2 — SAST: Semgrep
  # ----------------------------------------------------------
  sast-semgrep:
    name: "M2 · SAST — Semgrep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/python

  # ----------------------------------------------------------
  # MODULE 2 — SCA: Trivy
  # ----------------------------------------------------------
  sca-trivy:
    name: "M2 · SCA — Trivy"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy on requirements.txt
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: devsecops-lab/module-2-sast/sample-vulnerable-app/
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ----------------------------------------------------------
  # MODULE 2 — SCA: OSV Scanner (Google)
  # ----------------------------------------------------------
  sca-osv:
    name: "M2 · SCA — OSV Scanner"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action@v1.9.0
        with:
          scan-args: |-
            --lockfile=devsecops-lab/module-2-sast/sample-vulnerable-app/requirements.txt

